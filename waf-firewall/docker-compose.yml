version: '3.8'

services:
  waf-app:
    build: .
    container_name: waf-firewall
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB=waf_firewall
      - SECRET_KEY=your-super-secret-key-change-this
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - EMAIL_ALERTS=False
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: waf-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
