worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # WAF configuration
    upstream waf_backend {
        server 127.0.0.1:5000;
    }

    upstream origin_server {
        server example.com:80;
    }

    # Main server - WAF entry point
    server {
        listen 80;
        server_name waf.yourdomain.com;

        location / {
            proxy_pass http://waf_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            alias /var/www/waf/static/;
            expires 7d;
        }

        location /api/ {
            proxy_pass http://waf_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Example: Protected website behind WAF
    server {
        listen 80;
        server_name protected-site.com;

        location / {
            # Forward to WAF for analysis
            proxy_pass http://waf_backend/api/analyze;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # If WAF returns allowed, forward to origin
            error_page 418 = @origin;
        }

        location @origin {
            proxy_pass http://origin_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
